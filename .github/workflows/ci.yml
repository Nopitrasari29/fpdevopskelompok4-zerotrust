# Jobdesk 2 — Deploy langsung setelah build (TANPA gate keamanan)
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Verify Deployment Gate
        run: |
          echo "No security check performed"
          echo "Deployment proceeding directly after build"

      - name: Simulate Deployment
        run: |
          echo "Deploying TaskFlow API..."
          echo "Image: nginx:1.14"
          echo "Deployment successful"

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: Pipeline Status
        run: |
          echo "Build Result: ${{ needs.build.result }}"
          echo "Deploy Result: ${{ needs.deploy.result }}"

          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "CI/CD Pipeline completed successfully"
          else
            echo "CI/CD Pipeline failed"
            exit 1
          fi