name: Zero Trust CI/CD Pipeline

on:
  push:
    branches:
    - main
    - baseline-before-zerotrust

jobs:

# Pipeline dasar TaskFlow API dari modul sebelumnya
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Application
        run: |
          echo "Building TaskFlow API..."
          echo "Build completed"

